<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
   <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%230056b3'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' fill='white' font-family='Arial, sans-serif' font-weight='bold' font-size='60' dy='.35em'%3ET%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
      <header class="dashboard-header">
    <div class="header-content">
        <h1>
    <svg width="35" height="35" viewBox="0 0 100 100" style="vertical-align: middle; margin-right: 1px;">
        <circle cx="50" cy="50" r="48" fill="#0056b3"/>
        <text x="50%" y="50%" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold" font-size="60" dy=".35em">T</text>
    </svg>
    Task Manager <span>v5.0</span>
</h1>
        <p class="subtitle">Gerenciamento inteligente de produtividade</p>
    </div>
</header>

<section class="project-summary card">
    <div class="summary-item">
        <span class="summary-label">Projeto</span>
        <span class="summary-value">Infinity School Final Project</span>
    </div>
    <div class="summary-item">
        <span class="summary-label">Persistência</span>
        <span class="summary-value">LocalStorage Engine</span>
    </div>
    <div class="summary-item">
        <span class="summary-label">Status</span>
        <span class="summary-value status-active">CRUD Ativo</span>
    </div>
</section>

        <div class="dashboard">
    <header class="card">
        <h1>Dashboard de Tarefas</h1>
      
        
        <form id="todo-form" class="input-group">
            <input type="text" id="task-input" placeholder="O que precisa ser feito?" required>
            <input type="time" id="task-deadline">
            <button type="submit">ADICIONAR</button>
        </form>
    </header>

    <div class="card">
        <div id="task-list">
            </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
